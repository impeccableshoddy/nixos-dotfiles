# Monitors
monitorrule=name:^eDP-1$,width:2240,height:1400,refresh:60,x:0,y:10,scale:1.4,rr:0,vrr:0

exec-once=~/nixos-dotfiles/config/mango/autostart.sh

layerrule=noblur:1,noanim:1,layer_name:^(slurp|selection|overlay)$

# --- Core binds ---
bind=SUPER,Return,spawn,foot

bind=SUPER,space,spawn_shell,$HOME/.config/mango/menu.sh
bind=SUPER,e,spawn,bemoji
bind=SUPER,c,spawn_shell,cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind=SUPER,w,spawn_shell,$HOME/nixos-dotfiles/config/mango/wp-chooser.sh
bind=SUPER,s,spawn_shell,$HOME/nixos-dotfiles/config/mango/search.sh

# --- Visual System Apps ---
bind=SUPER+SHIFT,b,spawn,zen
bind=SUPER+SHIFT,n,spawn,foot -e nvim
bind=SUPER+SHIFT,t,spawn,thunar
bind=SUPER+SHIFT,d,spawn,legcord

# --- TUI binds ---
windowrule=isfloating:1,width:950,height:650,appid:foot,title:^(impala|bluetui|pulsemixer|btop|ncdu)$

bind=SUPER+CTRL,n,spawn,foot -T impala -e impala
bind=SUPER+CTRL,b,spawn,foot -T bluetui -e bluetui
bind=SUPER+CTRL,m,spawn,foot -T pulsemixer -e pulsemixer
bind=SUPER+CTRL,t,spawn,foot -T btop -e btop
bind=SUPER+CTRL,d,spawn,foot -T ncdu -e ncdu

# --- Volume / Brightness / Media ---
bind=NONE,XF86AudioRaiseVolume,spawn_shell,wpctl set-volume @DEFAULT_SINK@ 3%+ && VOL=$(echo "$(wpctl get-volume @DEFAULT_SINK@ | grep -oP '[0-9]+\.[0-9]+')*100" | bc | cut -d. -f1) && notify-send -r 9991 "ó°•¾ Volume" "${VOL}%" -h int:value:$VOL
bind=NONE,XF86AudioLowerVolume,spawn_shell,wpctl set-volume @DEFAULT_SINK@ 3%- && VOL=$(echo "$(wpctl get-volume @DEFAULT_SINK@ | grep -oP '[0-9]+\.[0-9]+')*100" | bc | cut -d. -f1) && notify-send -r 9991 "ó°•¾ Volume" "${VOL}%" -h int:value:$VOL
bind=NONE,XF86AudioMute,spawn,~/nixos-dotfiles/config/mango/volume-mute.sh
bind=NONE,XF86AudioMicMute,spawn,~/nixos-dotfiles/config/mango/mic-mute.sh

bind=NONE,XF86MonBrightnessUp,spawn_shell,brightnessctl set 5%+ && B=$(brightnessctl | grep -oP '[0-9]+(?=%)') && notify-send -r 9992 "ó°ƒ  Brightness" "$B%" -h int:value:$B
bind=SHIFT,XF86MonBrightnessUp,spawn_shell,brightnessctl set 100% && notify-send -r 9992 "ó°ƒ  Brightness" "100%" -h int:value:100
bind=NONE,XF86MonBrightnessDown,spawn_shell,brightnessctl set 5%- && B=$(brightnessctl | grep -oP '[0-9]+(?=%)') && notify-send -r 9992 "ó°ƒ  Brightness" "$B%" -h int:value:$B
bind=SHIFT,XF86MonBrightnessDown,spawn_shell,brightnessctl set 1% && notify-send -r 9992 "ó°ƒ  Brightness" "1%" -h int:value:1

bind=NONE,F10,spawn,playerctl previous
bind=NONE,F11,spawn,playerctl play-pause
bind=NONE,F12,spawn,playerctl next

bind=NONE,XF86WLAN,spawn,sh -c 'STATE=$(nmcli radio wifi); if [ "$STATE" = "enabled" ]; then nmcli radio wifi off; notify-send -r 9994 "ó°¤­ WiFi" "Disabled"; else nmcli radio wifi on; notify-send -r 9994 "ó°¤¨ WiFi" "Enabled"; fi'

bind=NONE,Print,spawn_shell,$HOME/nixos-dotfiles/config/mango/smart-snip.sh save
bind=SUPER,Print,spawn_shell,$HOME/nixos-dotfiles/config/mango/smart-snip.sh clip
bind=SHIFT,Print,spawn_shell,$HOME/nixos-dotfiles/config/mango/toggle-record.sh

# --- Tags ---
bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,6,comboview,6
bind=SUPER,7,comboview,7
bind=SUPER,8,comboview,8
bind=SUPER,9,comboview,9

# --- Move window to Tag ---
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# --- Window management ---
bind=SUPER,i,incnmaster,+1
bind=SUPER,u,incnmaster,-1
bind=SUPER,Tab,focuslast
bind=SUPER,q,killclient
bind=SUPER+SHIFT,q,quit
bind=SUPER,r,spawn_shell,mmsg dispatch reload_config && notify-send "ó°‘“ Config" "Reloaded"
bind=SUPER,p,switch_proportion_preset

# --- Layouts ---
bind=SUPER,t,setlayout,tile
bind=SUPER,v,setlayout,vertical_grid
bind=SUPER,x,setlayout,scroller
bind=SUPER,a,togglegaps
bind=SUPER,z,zoom
bind=SUPER,equal,setmfact,+0.05
bind=SUPER,minus,setmfact,-0.05

# Default layouts per tag
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

gappih=7
gappiv=7
gappoh=7
gappov=7
borderpx=1
border_radius = 9
no_border_when_single=1
focuscolor=#6E6E6E

# --- Mouse ---
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# --- Options ---
repeat_rate=35
repeat_delay=200

# --- Effects ---
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 1
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 1
shadow_only_floating=1
shadows_size = 12
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

# --- Animations ---
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.7
fadein_begin_opacity=0.6
fadeout_begin_opacity=0.8
animation_duration_move=250
animation_duration_open=250
animation_duration_tag=0
animation_duration_close=250
animation_curve_open=0.46,1.0,0.29,1.1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1

# --- Scroller ---
scroller_structs=20
scroller_default_proportion=1.0
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,f,togglefloating,

# --- Smart move ---
bind=CTRL+SHIFT,k,smartmovewin,up
bind=CTRL+SHIFT,j,smartmovewin,down
bind=CTRL+SHIFT,h,smartmovewin,left
bind=CTRL+SHIFT,l,smartmovewin,right

# --- Focus ---
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right

# --- Swap ---
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# --- Gestures ---
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
bind=SUPER,0,toggleoverview
