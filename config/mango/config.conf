# Monitors
monitorrule=name:Virtual-1,width:2240,height:1400,refresh:60,x:0,y:0

exec-once=~/nixos-dotfiles/config/mango/autostart.sh
exec-once=wlr-randr --output eDP-1 --scale 1.5

windowrule=isfloating:1,width:810,height:490,appid:floating_btop

# Force Wayland backends
env=GDK_BACKEND,wayland
env=XDG_SESSION_TYPE,wayland
env=QT_QPA_PLATFORM,wayland

# --- Core binds ---
bind=SUPER,Return,spawn,foot
bind=SUPER,b,spawn,zen
bind=SUPER,space,spawn,/home/badmaster67/.config/mango/menu.sh
bind=SUPER,w,spawn,/home/badmaster67/nixos-dotfiles/config/mango/wp-chooser.sh
bind=SUPER,m,spawn,cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# --- System TUI binds ---
bind=SUPER+SHIFT,n,spawn,foot -w 600x400 -e impala
bind=SUPER+SHIFT,b,spawn,foot -w 600x400 -e bluetui
bind=SUPER+SHIFT,m,spawn,foot -w 600x400 -e pulsemixer

# --- Volume / Brightness / Media ---
bind=NONE,XF86AudioRaiseVolume,spawn,sh -c 'pamixer -i 5; notify-send -r 9991 "󰕾 Volume" "$(pamixer --get-volume)%" -h int:value:$(pamixer --get-volume)'
bind=NONE,XF86AudioLowerVolume,spawn,sh -c 'pamixer -d 5; notify-send -r 9991 "󰕾 Volume" "$(pamixer --get-volume)%" -h int:value:$(pamixer --get-volume)'
bind=NONE,XF86AudioMute,spawn,sh -c 'pamixer -t; V=$(pamixer --get-volume); M=$(pamixer --get-mute); if [ "$M" = "true" ]; then notify-send -r 9991 "󰖁 Volume" "Muted" -h int:value:0; else notify-send -r 9991 "󰕾 Volume" "$V%" -h int:value:$V; fi'
bind=NONE,XF86AudioMicMute,spawn,sh -c 'pamixer --default-source -t; sleep 0.1; if pamixer --default-source --get-mute | grep -q true; then notify-send -r 9993 "󰍭 Microphone" "Muted" -h int:value:0; else notify-send -r 9993 "󰍬 Microphone" "Active" -h int:value:100; fi'
bind=NONE,XF86MonBrightnessUp,spawn,sh -c 'brightnessctl set 5%+; B=$(brightnessctl | grep -oP "[0-9]+(?=%)"); notify-send -r 9992 "󰃠 Brightness" "$B%" -h int:value:$B'
bind=NONE,XF86MonBrightnessDown,spawn,sh -c 'brightnessctl set 5%-; B=$(brightnessctl | grep -oP "[0-9]+(?=%)"); notify-send -r 9992 "󰃠 Brightness" "$B%" -h int:value:$B'
bind=NONE,XF86WLAN,spawn,sh -c 'STATE=$(nmcli radio wifi); if [ "$STATE" = "enabled" ]; then nmcli radio wifi off; notify-send -r 9994 "󰤭 WiFi" "Disabled"; else nmcli radio wifi on; notify-send -r 9994 "󰤨 WiFi" "Enabled"; fi'
bind=NONE,Print,spawn,/home/badmaster67/nixos-dotfiles/config/mango/snip.sh

# --- Tags ---
bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,6,comboview,6
bind=SUPER,7,comboview,7
bind=SUPER,8,comboview,8
bind=SUPER,9,comboview,9

# --- Window management ---
bind=SUPER,i,incnmaster,+1
bind=SUPER,u,incnmaster,-1
bind=SUPER,q,killclient
bind=SUPER+SHIFT,q,spawn,pkill mango
bind=SUPER+SHIFT,r,spawn,sh -c 'mmsg -d reload_config && notify-send "MangoWM" "Config reloaded ✓" -t 2000'

# --- Layouts ---
bind=SUPER,t,setlayout,tile
bind=SUPER,v,setlayout,vertical_grid
bind=SUPER,c,setlayout,spiral
bind=SUPER,x,setlayout,scroller
bind=SUPER,n,switch_layout
bind=SUPER,a,togglegaps

# Default layouts per tag
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

gappih=10
gappiv=10
gappoh=10
gappov=10
borderpx=0
no_border_when_single=1
focuscolor=0x005577ff

# --- Mouse ---
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# --- Options ---
repeat_rate=35
repeat_delay=200

# --- Effects ---
blur=0
blur_layer=1
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 1
shadow_only_floating=1
shadows_size = 12
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

# --- Animations ---
animations=0
layer_animations=1
animation_type_open=zoom
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.7
fadein_begin_opacity=0.6
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_curve_open=0.46,1.0,0.29,1.1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1

# --- Scroller ---
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,f,togglefloating,

# --- Smart move ---
bind=CTRL+SHIFT,k,smartmovewin,up
bind=CTRL+SHIFT,j,smartmovewin,down
bind=CTRL+SHIFT,h,smartmovewin,left
bind=CTRL+SHIFT,l,smartmovewin,right

# --- Focus ---
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right

# --- Swap ---
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# --- Gestures ---
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
bind=SUPER,0,toggleoverview
