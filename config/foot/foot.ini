[main]
font=CommitMono Nerd Font Mono:size=13:fontfeatures=calt=1,liga=1
pad=4x4
initial-window-size-chars=90x25

[colors-dark]
# The deep, dark red-black void
background=110808
# Piercing, cold white - like moonlight on steel
foreground=e6e8f0
alpha=0.87

## Normal colors (Readable base, cooled down)
# Black (Darkest pit)
regular0=1a0b0d
# Red (Deep arterial red)
regular1=b40c14
# Green (Cold, muted sage - visible but not warm)
regular2=7a9a78
# Yellow (Cold amber/rusted iron)
regular3=d4a65a
# Blue (Icy slate - high contrast for directories)
regular4=7b9fc7
# Magenta (Bruised plum)
regular5=946892
# Cyan (Cold steel - distinct for symlinks)
regular6=68a8a8
# White (Frosty gray - standard text that isn't pure white)
regular7=c2c6d0

## Bright colors (Maximum contrast, sharp and cutting)
# Bright Black (Charred rock/Deep shadow)
bright0=4a3539
# Bright Red (The alarm/screaming red)
bright1=ce2c3a
# Bright Green (Sharp, frost-touched foliage)
bright2=a4d08e
# Bright Yellow (Bright cold amber)
bright3=f0c47e
# Bright Blue (High-vis ice blue - bold directories)
bright4=9ec5f5
# Bright Magenta (Dusty cold rose)
bright5=d9a4ca
# Bright Cyan (Bright cold steel)
bright6=9cdada
# Bright White (The sharp white spikes - absolute maximum contrast)
bright7=f4f6fc

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
scrollback-up-line=Shift+Up
scrollback-down-line=Shift+Down
search-start=Control+Shift+r
font-increase=Control+equal
font-decrease=Control+minus
font-reset=Control+0

[search-bindings]
cancel=Escape
commit=Return
find-prev=Control+r
find-next=Control+s

